version: '3.8'

services:
  # 1. The Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. The API Server
  api:
    build:
      context: ./Backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    depends_on:
      redis:
        condition: service_healthy

  # 3. The Celery Worker (AI & Quant Math)
  worker:
    build:
      context: ./Backend
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./Backend/.env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  # 4. The Celery Beat (Drift Monitor Scheduler)
  beat:
    build:
      context: ./Backend
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - ./Backend/.env
    depends_on:
      redis:
        condition: service_healthy

  # 5. The React Vite Frontend
  frontend:
    build:
      context: ./Frontend
    ports:
      - "3000:3000"
    environment:
      # This connects the React container to your API container seamlessly
      - VITE_API_URL=http://localhost:8000 
    depends_on:
      - api